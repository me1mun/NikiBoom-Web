<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Niki Merge</title>
    <script src="playDeckBridge.js"></script>
</head>
<body class="dark">
<div id="unity-container" style="position: absolute; width: 100%; height: 100%">
    <canvas id="unity-canvas" width=520 height=960 style="width: 100%; height: 100%"></canvas>
</div>
<script>
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/MemeCoin.loader.js";
    const config = {
        dataUrl: buildUrl + "/8836e0ab79dc3748fd7dd92ac8edf33e.data",
        frameworkUrl: buildUrl + "/89ab6b901b8a2b5bb5588006ed100f69.js",
        codeUrl: buildUrl + "/812104f4fcdb1a8db0ce2f76bd6c2bf7.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Niki Company",
        productName: "Niki Merge",
        productVersion: "3.0.0",
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        config.devicePixelRatio = window.devicePixelRatio;
    }
    
    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        const playdeckBridgeInstance = playDeckBridge();
        createUnityInstance(canvas, config, (progress) => {
            playdeckBridgeInstance?.setLoadingProgress(progress * 100)
        }).then(unityInstance => {
            playdeckBridgeInstance?.init(unityInstance);
        });
    };
    document.body.appendChild(script);
</script>
</body>
</html>
